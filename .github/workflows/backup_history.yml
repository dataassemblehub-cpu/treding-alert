name: Backup Price History DB

on:
  schedule:
    # Run once a week on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Restore market database cache
        uses: actions/cache@v4
        with:
          path: data/market_data.db
          key: market-data-db-backup-${{ github.run_id }}
          restore-keys: |
            market-data-db-
          
      - name: Commit DB backup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] Weekly backup of market_data.db"
          file_pattern: 'data/market_data.db'
