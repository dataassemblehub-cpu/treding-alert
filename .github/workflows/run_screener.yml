name: Run Trading Alert Screener

on:
  schedule:
    # NSE Market Hours: 9:15 AM - 3:30 PM IST (Mon-Fri)
    # IST is UTC+5:30. 
    # 03:45 UTC = 9:15 AM IST
    # 05:45 UTC = 11:15 AM IST - for now stopped
    # 07:45 UTC = 1:15 PM IST - for now stopped
    # 09:45 UTC = 3:15 PM IST
    - cron: '45 3,9 * * 1-5'
  workflow_dispatch:

jobs:
  screen-and-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Cache price history database
        uses: actions/cache@v4
        with:
          path: data/price_history.db
          key: price-history-db-${{ github.run_id }}
          restore-keys: |
            price-history-db-
          
      - name: Run Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        
      - name: Commit Database Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] Update market data and alert log"
          file_pattern: 'data/market_data.db'
