# Settings for Trading Alert System

# The threshold percentage to define "near" a low. 
# 0.02 means 2% above the low.
threshold_pct: 0.02

# Minimum volume ratio compared to the 20-day average.
# 0.5 means today's volume must be at least 50% of the 20-day average.
min_volume_ratio: 0.5

# Note on run frequency:
# The GitHub Actions workflow is scheduled to run every 2 hours 
# during NSE market hours (9:15 AM - 3:30 PM IST, Mon-Fri).
