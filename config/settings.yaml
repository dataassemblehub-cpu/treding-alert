# Global configuration settings

# Determines the size of the threshold based on the stock's 14-day ATR.
atr_multiplier: 1.0

# Minimum volume required relative to 20-day average
min_volume_ratio: 0.5

# Note on run frequency:
# The GitHub Actions workflow is scheduled to run every 2 hours 
# during NSE market hours (9:15 AM - 3:30 PM IST, Mon-Fri).
